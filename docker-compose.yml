# Backward-compat wrapper. The canonical sales-only compose file lives at
# deploy/compose.sales-only.yml.
#
# This file exists so that `docker compose up -d` at the repo root continues
# to work on already-deployed VPSes without changing their runbooks. New
# deployments should target the bundle files directly:
#
#   docker compose -f deploy/compose.sales-only.yml      up -d
#   docker compose -f deploy/compose.marketing-only.yml  up -d
#   docker compose -f deploy/compose.combined.yml        up -d
#
# Requires Docker Compose 2.20+ for the `include:` directive. On older
# Compose versions, copy the contents of deploy/compose.sales-only.yml
# here instead (with paths adjusted: `../foo` → `./foo`).

include:
  - deploy/compose.sales-only.yml
