{% extends "base.html" %}
{% block title %}Rep Detail{% endblock %}
{% block content %}
<div class="space-y-6">
    <div>
        <a href="/ui/reps" class="text-sm text-zinc-400 hover:text-white">← Back to reps</a>
        <h1 class="mt-2 text-2xl font-semibold text-white">Rep Detail</h1>
        <p class="mt-1 text-sm text-zinc-400">ID: <code class="rounded bg-zinc-800/60 px-1.5 py-0.5 text-xs">{{ rep_id }}</code></p>
    </div>
    <div class="rounded-lg border border-zinc-800/60 bg-zinc-900/60 p-12 text-center text-zinc-500">
        Per-rep score trends + coaching effectiveness check coming next.
    </div>
</div>
{% endblock %}
