# Dev overlay: hot-reload + source mount.
# Layer over any bundle compose file, e.g.:
#   docker compose -f deploy/compose.sales-only.yml -f deploy/compose.dev.yml up
# Or via Makefile:  make dev

services:
  api:
    command: uvicorn sales.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ..:/app
    environment:
      - APP_ENV=development

  worker:
    command: celery -A sales.app.workers.celery_app worker --loglevel=debug --concurrency=2
    volumes:
      - ..:/app
    environment:
      - APP_ENV=development

  beat:
    volumes:
      - ..:/app
    environment:
      - APP_ENV=development
